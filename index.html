<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovebirds Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sarti: rgb(52, 137, 255); 
            --elize: rgb(252, 200, 77); 
            --jaz: rgb(249, 114, 217); 
            --line-color: rgb(200, 191, 231); /* RGB 200, 191, 231 */
        }

        /* 5 & 6: FULL BLACK / BACKGROUND DEF */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #000;
            background-image: url('PLACEHOLDER_FOR_BACKGROUND_IMAGE.jpg'); 
            background-size: cover; background-position: center;
            color: white; font-family: sans-serif; overflow: hidden; 
        }

        #app { display: flex; height: 100vh; width: 100%; justify-content: center; }
        
        /* 1400px Centered Workspace - NO GLOBAL SIDE BORDERS */
        #workspace { width: 1400px; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* 1 & 2: TOP LINE AND LOGO BELOW IT */
        #top-line { width: 100%; height: 2px; background: var(--line-color); margin-top: 20px; }
        #logo-wrap { margin: 15px 0; }
        #main-logo { height: 80px; width: auto; } /* Placeholder for Logo */

        /* 2 & 4: THE CHAT BOX - DISCONNECTED LINES */
        #chat-window { 
            width: 1200px; height: 500px; 
            border: 2px solid var(--line-color); 
            background: rgba(0,0,0,0.6);
            margin-bottom: 20px; padding: 30px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 25px;
        }

        /* MESSAGE ALIGNMENT */
        .msg-row { display: flex !important; width: 100% !important; }
        .msg-row.self { justify-content: flex-end !important; }
        .msg-row.self .msg-content-wrapper { flex-direction: row-reverse; }
        .msg-row.self .avatar { margin-left: 15px; }
        .msg-row.other { justify-content: flex-start !important; }
        .msg-row.other .avatar { margin-right: 15px; }
        .msg-content-wrapper { display: flex; align-items: flex-start; max-width: 80%; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--line-color); flex-shrink: 0; }

        .bubble { border-radius: 12px; overflow: hidden; color: #000 !important; font-size: 18px; }
        .bubble.Sarti { background: var(--sarti); }
        .bubble.Elize { background: var(--elize); }
        .bubble.Jaz { background: var(--jaz); }
        .lang-top { padding: 12px 18px; font-weight: bold; }
        .lang-bottom { padding: 10px 18px; font-size: 16px; opacity: 0.8; border-top: 1px solid rgba(0,0,0,0.1); }

        /* 4: SLIM INPUT BOX DESIGN */
        #input-area-wrap { width: 1200px; position: relative; }
        #input-box { 
            width: 100%; height: 45px; 
            border: 2px solid var(--line-color); 
            display: flex; align-items: center; padding: 0 15px; box-sizing: border-box;
        }
        .input-icons { display: flex; gap: 15px; font-size: 20px; color: var(--line-color); margin-right: 15px; }
        #msg-input { 
            flex: 1; background: transparent; border: none; color: white; 
            font-size: 16px; outline: none; height: 100%; 
        }
        #send-btn { background: transparent; border: none; color: var(--line-color); font-size: 22px; cursor: pointer; }

        /* 3: THE AVATAR CRADLE STRUCTURE */
        #cradle-wrap { width: 1200px; position: relative; height: 150px; }
        
        /* Side bars connecting input box to avatar line */
        .cradle-arm { position: absolute; width: 2px; height: 60px; background: var(--line-color); top: 0; }
        .arm-left { left: 0; }
        .arm-right { right: 0; }

        /* Horizontal line connecting the circles */
        #avatar-line { position: absolute; top: 60px; left: 0; width: 100%; height: 2px; background: var(--line-color); }

        /* 3: THREE AVATAR PLACEHOLDERS */
        #avatar-placeholders { 
            position: absolute; top: 15px; width: 100%; 
            display: flex; justify-content: space-around; align-items: center; 
        }
        .placeholder-circle { 
            width: 90px; height: 90px; border-radius: 50%; 
            border: 2px solid var(--line-color); background: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .placeholder-circle img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="app">
        <div id="workspace">
            <div id="top-line"></div>
            
            <div id="logo-wrap">
                <img id="main-logo" src="PLACEHOLDER_FOR_MAIN_LOGO.png" alt="Logo">
            </div>

            <div id="chat-window"></div>

            <div id="input-area-wrap">
                <div id="input-box">
                    <div class="input-icons">
                        <i class="fa-regular fa-face-smile"></i>
                        <i class="fa-solid fa-paperclip"></i>
                    </div>
                    <input type="text" id="msg-input" placeholder="Type Message...">
                    <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="cradle-wrap">
                <div class="cradle-arm arm-left"></div>
                <div class="cradle-arm arm-right"></div>
                <div id="avatar-line"></div>
                
                <div id="avatar-placeholders">
                    <div class="placeholder-circle"><img src="AVATAR_1_PLACEHOLDER.png"></div>
                    <div class="placeholder-circle"><img src="AVATAR_2_PLACEHOLDER.png"></div>
                    <div class="placeholder-circle"><img src="AVATAR_3_PLACEHOLDER.png"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://wegsfwhemblmsfhrkjmu.supabase.co'; 
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZ3Nmd2hlbWJsbXNmaHJram11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTMzMDYsImV4cCI6MjA5MjQ2OTMwNn0.S8YLjVm-R_qKE_Vzj6xANyoN1DEmJ0oHJCEK1y18QUY'; 
        const _client = supabase.createClient(SUPA_URL, SUPA_KEY);

        let activeUser = "Sarti"; // Defaulting for design test
        const avatars = {
            'Sarti': 'AVATAR_1_PLACEHOLDER.png',
            'Elize': 'AVATAR_2_PLACEHOLDER.png',
            'Jaz': 'AVATAR_3_PLACEHOLDER.png'
        };

        async function draw(msg) {
            const isSelf = msg.sender === activeUser;
            const win = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
            let topText = msg.content;
            let bottomText = msg.content;

            if (!isSelf) {
                const langPair = (activeUser === 'Sarti') ? 'zh|en' : 'en|zh';
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(msg.content)}&langpair=${langPair}`);
                    const json = await res.json();
                    const trans = json.responseData.translatedText;
                    if (trans && trans !== "null") { topText = trans; }
                } catch (e) {}
            }

            row.innerHTML = `
                <div class="msg-content-wrapper">
                    <img src="${avatars[msg.sender]}" class="avatar">
                    <div class="bubble ${msg.sender}">
                        <div class="lang-top">${topText}</div>
                        <div class="lang-bottom">${bottomText}</div>
                    </div>
                </div>
            `;
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            await _client.from('messages').insert([{ sender: activeUser, content: text }]);
            input.value = "";
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key === 'Enter') send(); };

        async function startSync() {
            const { data } = await _client.from('messages').select('*').order('created_at', { ascending: true });
            if (data) { for (const m of data) { await draw(m); } }
            _client.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async p => await draw(p.new)).subscribe();
        }
        startSync();
    </script>
</body>
</html>
