<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovebirds Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sarti: rgb(52, 137, 255); 
            --elize: rgb(252, 200, 77); 
            --jaz: rgb(249, 114, 217); 
            --line-color: rgb(200, 191, 231); 
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #000;
            background-image: url('black-gold.png'); 
            background-size: cover; background-position: center;
            color: white; font-family: sans-serif; overflow: hidden; 
        }

        /* 1. THE SQUARE SCREEN BORDER - UPDATED TO 10px */
        #screen-border {
            position: fixed;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid var(--line-color);
            pointer-events: none; 
            z-index: 9999;
        }

        *:focus { outline: none !important; }

        #overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        #overlay-logo-container {
            position: absolute; top: 150px; width: 100%; display: flex; justify-content: center;
            pointer-events: none;
        }
        #overlay-logo { width: 256px; height: 256px; object-fit: contain; }

        #login-form { display: flex; flex-direction: column; align-items: center; margin-top: 250px; }

        #overlay select, #overlay button { 
            padding: 15px; font-size: 18px; border-radius: 8px; width: 320px; 
            margin: 10px; border: 1px solid var(--line-color); background: #111; color: white; 
            position: relative; z-index: 2000;
        }
        #overlay button { background: var(--line-color); color: #000; font-weight: bold; cursor: pointer; border: none; }

        #app { display: none; height: 100vh; width: 100%; justify-content: center; }
        #workspace { width: 1400px; display: flex; flex-direction: column; align-items: center; position: relative; }

        #chat-line-top { position: absolute; width: 1000px; height: 1px; background: var(--line-color); left: 200px; top: 20px; pointer-events: none; }

        #status-display { 
            position: absolute; top: 40px; right: 40px;
            color: var(--line-color); font-size: 14px; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 2px; z-index: 20;
        }

        #logo-wrap { margin-top: 50px; margin-bottom: 15px; z-index: 10; }
        #main-logo { height: 85px; width: auto; pointer-events: none; }

        .chat-line-v { position: absolute; width: 1px; height: 350px; background: var(--line-color); top: 230px; pointer-events: none; }
        #chat-line-left { left: 50px; }   
        #chat-line-right { right: 50px; } 

        #chat-window { 
            width: 1220px; height: 430px; /* Reduced to pull elements up */
            margin: 20px 0; padding: 20px 0;
            overflow-y: auto; display: flex; flex-direction: column; gap: 25px;
            z-index: 5;
            scrollbar-width: none;
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .msg-row { display: flex !important; width: 100% !important; padding: 0 !important; }
        .msg-row.self { justify-content: flex-end !important; }
        .msg-row.self .msg-content-wrapper { flex-direction: row-reverse; }
        .msg-row.self .avatar { margin-left: 15px; }
        .msg-row.other { justify-content: flex-start !important; }
        .msg-row.other .avatar { margin-right: 15px; }
        .msg-content-wrapper { display: flex; align-items: flex-start; max-width: 80%; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--line-color); flex-shrink: 0; object-fit: cover; }

        .bubble { border-radius: 12px; overflow: hidden; color: #000 !important; font-size: 18px; }
        .bubble.Sarti { background: var(--sarti); }
        .bubble.Elize { background: var(--elize); }
        .bubble.Jaz { background: var(--jaz); }
        .lang-top { padding: 12px 18px; font-weight: bold; }
        .lang-bottom { padding: 10px 18px; font-size: 16px; opacity: 0.8; border-top: 1px solid rgba(0,0,0,0.1); }

        /* INPUT BOX */
        #input-area-wrap { width: 1200px; position: relative; margin-top: 5px; }
        #input-box { width: 100%; height: 45px; border: 1px solid var(--line-color); display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .input-icons { display: flex; gap: 15px; font-size: 18px; color: var(--line-color); margin-right: 15px; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        #send-btn { background: transparent; border: none; color: cyan; font-size: 20px; cursor: pointer; }

        /* AVATAR FOOTER */
        #avatar-footer { width: 800px; margin-top: 15px; margin-bottom: 30px; display: flex; justify-content: space-around; align-items: center; }
        .placeholder-circle { width: 90px; height: 90px; border-radius: 50%; border: 1px solid var(--line-color); background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .placeholder-circle img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="screen-border"></div>

    <div id="overlay">
        <div id="overlay-logo-container">
            <img id="overlay-logo" src="wethreelove.png">
        </div>
        <div id="login-form">
            <select id="user-select">
                <option value="Sarti">Sarti</option>
                <option value="Elize">Elize</option>
                <option value="Jaz">Jaz</option>
            </select>
            <button id="login-btn">ENTER CHAT</button>
        </div>
    </div>

    <div id="app">
        <div id="workspace">
            <div id="chat-line-top"></div>
            <div id="status-display">LOGGED IN AS: ---</div>
            <div id="logo-wrap">
                <img id="main-logo" src="wethreelove.png">
            </div>
            <div id="chat-line-left" class="chat-line-v"></div>
            <div id="chat-line-right" class="chat-line-v"></div>
            <div id="chat-window"></div>
            <div id="input-area-wrap">
                <div id="input-box">
                    <div class="input-icons">
                        <i class="fa-regular fa-face-smile"></i>
                        <i class="fa-solid fa-paperclip"></i>
                    </div>
                    <input type="text" id="msg-input" placeholder="Type Message...">
                    <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
            <div id="avatar-footer">
                <div class="placeholder-circle"><img src="Elize.png"></div>
                <div class="placeholder-circle"><img src="Sarti.png"></div>
                <div class="placeholder-circle"><img src="Jaz.png"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://wegsfwhemblmsfhrkjmu.supabase.co'; 
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZ3Nmd2hlbWJsbXNmaHJram11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTMzMDYsImV4cCI6MjA5MjQ2OTMwNn0.S8YLjVm-R_qKE_Vzj6xANyoN1DEmJ0oHJCEK1y18QUY'; 
        const _client = supabase.createClient(SUPA_URL, SUPA_KEY);

        let activeUser = ""; 
        const avatars = { 'Sarti': 'Sarti.png', 'Elize': 'Elize.png', 'Jaz': 'Jaz.png' };

        document.getElementById('login-btn').onclick = () => {
            activeUser = document.getElementById('user-select').value;
            document.getElementById('status-display').innerText = "LOGGED IN AS: " + activeUser;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            startSync();
        };

        async function draw(msg) {
            const isSelf = msg.sender === activeUser;
            const win = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
            let topText = msg.content;
            let bottomText = msg.content;

            if (!isSelf) {
                const langPair = (activeUser === 'Sarti') ? 'zh|en' : 'en|zh';
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(msg.content)}&langpair=${langPair}`);
                    const json = await res.json();
                    const trans = json.responseData.translatedText;
                    if (trans && trans !== "null") { topText = trans; }
                } catch (e) {}
            }

            row.innerHTML = `
                <div class="msg-content-wrapper">
                    <img src="${avatars[msg.sender]}" class="avatar">
                    <div class="bubble ${msg.sender}">
                        <div class="lang-top">${topText}</div>
                        <div class="lang-bottom">${bottomText}</div>
                    </div>
                </div>
            `;
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            await _client.from('messages').insert([{ sender: activeUser, content: text }]);
            input.value = "";
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key === 'Enter') send(); };

        async function startSync() {
            const { data } = await _client.from('messages').select('*').order('created_at', { ascending: true });
            document.getElementById('chat-window').innerHTML = "";
            if (data) { for (const m of data) { await draw(m); } }
            _client.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async p => await draw(p.new)).subscribe();
        }
    </script>
</body>
</html>
