<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovebirds Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --sarti: rgb(52, 137, 255); --elize: rgb(252, 200, 77); --jaz: rgb(249, 114, 217); }
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #overlay select, #overlay button { padding: 15px; font-size: 18px; border-radius: 8px; width: 320px; margin: 10px; }
        #overlay button { background: #fff; color: #000; font-weight: bold; cursor: pointer; border: none; }

        #app { display: none; height: 100vh; width: 100%; display: flex; }
        #workspace { flex: 1; display: flex; justify-content: center; background: #0a0a0a; overflow-x: auto; }
        
        #chat-container { width: 1400px; min-width: 1400px; background: #111; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; }
        #chat-window { flex: 1; overflow-y: auto; padding: 50px; display: flex; flex-direction: column; gap: 30px; }

        /* ALIGNMENT: AUTHOR ON RIGHT, RECEIVED ON LEFT */
        .msg-row { display: flex; width: 100%; }
        .msg-row.self { justify-content: flex-end; }
        .msg-row.self .msg-content-wrapper { flex-direction: row-reverse; }
        .msg-row.self .avatar { margin-left: 20px; }

        .msg-row.other { justify-content: flex-start; }
        .msg-row.other .msg-content-wrapper { flex-direction: row; }
        .msg-row.other .avatar { margin-right: 20px; }

        .msg-content-wrapper { display: flex; align-items: flex-start; max-width: 80%; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: #333; flex-shrink: 0; border: 2px solid #222; }
        
        .bubble { border-radius: 18px; overflow: hidden; color: #000 !important; font-size: 20px; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: relative; }
        .bubble.Sarti { background: var(--sarti); }
        .bubble.Elize { background: var(--elize); }
        .bubble.Jaz { background: var(--jaz); }

        .lang-top { padding: 20px 25px; font-weight: bold; white-space: pre-wrap; min-height: 1.5em; }
        .lang-divider { height: 1px; background: rgba(0,0,0,0.1); width: 100%; }
        .lang-bottom { padding: 15px 25px; font-size: 18px; opacity: 0.7; white-space: pre-wrap; border-top: 1px solid rgba(0,0,0,0.05); }

        /* Retry Button Style */
        .retry-btn { 
            display: inline-block; margin: 0 25px 10px 25px; font-size: 12px; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; color: rgba(0,0,0,0.5); border: 1px solid rgba(0,0,0,0.2);
            padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.2);
        }
        .retry-btn:hover { background: rgba(255,255,255,0.4); color: #000; }

        #input-dock { padding: 30px; background: #1a1a1a; border-top: 1px solid #222; display: flex; flex-direction: column; align-items: center; }
        #msg-input { width: 1000px; height: 80px; padding: 15px; font-size: 18px; border-radius: 10px; background: #fff; color: #000; resize: none; border: none; outline: none; }
        #send-btn { width: 300px; margin-top: 15px; padding: 15px; background: #444; color: #fff; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>LOVEBIRDS</h1>
        <select id="user-select"><option value="Sarti">Sarti</option><option value="Elize">Elize</option><option value="Jaz">Jaz</option></select>
        <button id="login-btn">ENTER CHAT</button>
    </div>

    <div id="app">
        <div id="workspace">
            <div id="chat-container">
                <div id="chat-window"></div>
                <div id="input-dock">
                    <textarea id="msg-input" placeholder="Type a message..."></textarea>
                    <button id="send-btn">SEND MESSAGE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://wegsfwhemblmsfhrkjmu.supabase.co'; 
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZ3Nmd2hlbWJsbXNmaHJram11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTMzMDYsImV4cCI6MjA5MjQ2OTMwNn0.S8YLjVm-R_qKE_Vzj6xANyoN1DEmJ0oHJCEK1y18QUY'; 
        const _client = supabase.createClient(SUPA_URL, SUPA_KEY);

        let activeUser = "";
        const avatars = { 'Sarti': 'https://placehold.co/100/3489ff/ffffff?text=S', 'Elize': 'https://placehold.co/100/fcc84d/000000?text=E', 'Jaz': 'https://placehold.co/100/f972d9/000000?text=J' };

        document.getElementById('login-btn').onclick = () => {
            activeUser = document.getElementById('user-select').value;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            startSync();
        };

        async function translateText(text, targetLang) {
            if (!text) return "";
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=autodetect|${targetLang}`);
                const data = await res.json();
                if (data?.responseData?.translatedText && data.responseData.translatedText !== "null") {
                    return data.responseData.translatedText;
                }
                return null; // Return null if failed so we can show the button
            } catch (e) { return null; }
        }

        async function manualRetry(btn, originalText) {
            const targetLang = (activeUser === 'Sarti') ? 'en' : 'zh';
            btn.innerText = "Translating...";
            const translated = await translateText(originalText, targetLang);
            if (translated) {
                btn.parentElement.querySelector('.lang-top').innerText = translated;
                btn.remove();
            } else {
                btn.innerText = "Failed. Try Again?";
            }
        }

        async function draw(msg) {
            const isSelf = msg.sender === activeUser;
            const win = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
            
            let topDisplay = msg.content;
            let needsRetry = false;

            if (!isSelf) {
                const target = (activeUser === 'Sarti') ? 'en' : 'zh';
                const result = await translateText(msg.content, target);
                if (result) {
                    topDisplay = result;
                } else {
                    needsRetry = true;
                }
            }

            row.innerHTML = `
                <div class="msg-content-wrapper">
                    <img src="${avatars[msg.sender]}" class="avatar">
                    <div class="bubble ${msg.sender}">
                        <div class="lang-top">${topDisplay}</div>
                        <div class="lang-divider"></div>
                        <div class="lang-bottom">${msg.content}</div>
                        ${needsRetry ? `<div class="retry-btn" onclick="manualRetry(this, '${msg.content.replace(/'/g, "\\'")}')">Translate</div>` : ''}
                    </div>
                </div>
            `;
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            await _client.from('messages').insert([{ sender: activeUser, content: text }]);
            input.value = ""; input.focus();
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

        async function startSync() {
            const { data } = await _client.from('messages').select('*').order('created_at', { ascending: true });
            document.getElementById('chat-window').innerHTML = "";
            if (data) { for (const m of data) { await draw(m); } }
            _client.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async p => await draw(p.new)).subscribe();
        }
    </script>
</body>
</html>
