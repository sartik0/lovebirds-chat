<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovebirds Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sarti: rgb(52, 137, 255); 
            --elize: rgb(252, 200, 77); 
            --jaz: rgb(249, 114, 217); 
            --line-color: rgb(200, 191, 231); /* The lavender color you requested */
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            /* BACKGROUND IMAGE PLACEHOLDER */
            background: url('YOUR_BACKGROUND_FILE_HERE.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white; font-family: sans-serif; overflow: hidden; 
        }
        
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #overlay h1 { color: #fff; margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }
        #overlay select, #overlay button { padding: 15px; font-size: 18px; border-radius: 8px; width: 320px; margin: 10px; border: 1px solid #333; }
        #overlay button { background: #fff; color: #000; font-weight: bold; cursor: pointer; border: none; }

        #app { display: none; height: 100vh; width: 100%; display: flex; }
        #workspace { flex: 1; display: flex; justify-content: center; overflow-x: auto; }
        
        #chat-container { 
            width: 1400px; min-width: 1400px; 
            background: rgba(17, 17, 17, 0.9); /* Slight transparency to see background */
            display: flex; flex-direction: column; 
            border-left: 2px solid var(--line-color); 
            border-right: 2px solid var(--line-color); 
        }

        /* TOP LOGO AREA */
        #logo-header {
            width: 100%; height: 120px; display: flex; justify-content: center; align-items: center;
            border-bottom: 1px solid var(--line-color);
        }
        .top-logo { height: 80px; width: auto; }

        #chat-window { flex: 1; overflow-y: auto; padding: 50px; display: flex; flex-direction: column; gap: 40px; }

        .msg-row { display: flex !important; width: 100% !important; margin-bottom: 20px; }
        .msg-row.self { justify-content: flex-end !important; }
        .msg-row.self .msg-content-wrapper { flex-direction: row-reverse; }
        .msg-row.self .avatar { margin-left: 20px; }
        .msg-row.other { justify-content: flex-start !important; }
        .msg-row.other .msg-content-wrapper { flex-direction: row; }
        .msg-row.other .avatar { margin-right: 20px; }
        .msg-content-wrapper { display: flex; align-items: flex-start; max-width: 85%; }
        .avatar { width: 65px; height: 65px; border-radius: 50%; background: #333; flex-shrink: 0; border: 2px solid var(--line-color); }
        
        .bubble { border-radius: 18px; overflow: hidden; color: #000 !important; font-size: 20px; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .bubble.Sarti { background: var(--sarti); }
        .bubble.Elize { background: var(--elize); }
        .bubble.Jaz { background: var(--jaz); }
        .lang-top { padding: 20px 25px; font-weight: bold; white-space: pre-wrap; }
        .lang-divider { height: 1px; background: rgba(0,0,0,0.1); width: 100%; }
        .lang-bottom { padding: 15px 25px; font-size: 18px; opacity: 0.8; white-space: pre-wrap; border-top: 1px solid rgba(0,0,0,0.05); }

        /* NEW DESIGN MESSAGE BOX */
        #input-dock { 
            padding: 20px 40px; background: #151515; 
            border-top: 2px solid var(--line-color); 
            display: flex; align-items: center; gap: 20px;
        }
        .input-controls { display: flex; gap: 20px; font-size: 24px; color: var(--line-color); cursor: pointer; }
        .input-controls i:hover { color: white; }

        #msg-input { 
            flex: 1; height: 50px; padding: 12px 20px; font-size: 18px; border-radius: 25px; 
            background: #222; color: #fff; border: 1px solid var(--line-color); outline: none; resize: none;
        }
        #send-btn { 
            background: var(--line-color); color: #000; width: 50px; height: 50px; 
            border-radius: 50%; border: none; cursor: pointer; display: flex; 
            justify-content: center; align-items: center; font-size: 20px;
        }
        #send-btn:hover { background: white; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>LOVEBIRDS</h1>
        <select id="user-select">
            <option value="Sarti">Sarti</option>
            <option value="Elize">Elize</option>
            <option value="Jaz">Jaz</option>
        </select>
        <button id="login-btn">ENTER CHAT</button>
    </div>

    <div id="app">
        <div id="workspace">
            <div id="chat-container">
                <div id="logo-header">
                    <img src="YOUR_LOGO_FILE_HERE.png" class="top-logo">
                </div>
                <div id="chat-window"></div>
                <div id="input-dock">
                    <div class="input-controls">
                        <i class="fa-regular fa-face-smile" title="Emoji"></i>
                        <i class="fa-solid fa-paperclip" title="File Upload"></i>
                    </div>
                    <textarea id="msg-input" placeholder="Type a message..."></textarea>
                    <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://wegsfwhemblmsfhrkjmu.supabase.co'; 
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlZ3Nmd2hlbWJsbXNmaHJram11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTMzMDYsImV4cCI6MjA5MjQ2OTMwNn0.S8YLjVm-R_qKE_Vzj6xANyoN1DEmJ0oHJCEK1y18QUY'; 
        const _client = supabase.createClient(SUPA_URL, SUPA_KEY);

        let activeUser = "";
        
        /* AVATAR IMAGE PLACEHOLDERS */
        const avatars = {
            'Sarti': 'SARTI_AVATAR_FILE.png',
            'Elize': 'ELIZE_AVATAR_FILE.png',
            'Jaz': 'JAZ_AVATAR_FILE.png'
        };

        document.getElementById('login-btn').onclick = () => {
            activeUser = document.getElementById('user-select').value;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            startSync();
        };

        async function draw(msg) {
            const isSelf = msg.sender === activeUser;
            const win = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
            let topText = msg.content;
            let bottomText = msg.content;

            if (!isSelf) {
                const langPair = (activeUser === 'Sarti') ? 'zh|en' : 'en|zh';
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(msg.content)}&langpair=${langPair}`);
                    const json = await res.json();
                    const trans = json.responseData.translatedText;
                    if (trans && trans !== "null") { topText = trans; }
                } catch (e) { console.error("Translation failed", e); }
            }

            row.innerHTML = `
                <div class="msg-content-wrapper">
                    <img src="${avatars[msg.sender]}" class="avatar">
                    <div class="bubble ${msg.sender}">
                        <div class="lang-top">${topText}</div>
                        <div class="lang-divider"></div>
                        <div class="lang-bottom">${bottomText}</div>
                    </div>
                </div>
            `;
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            await _client.from('messages').insert([{ sender: activeUser, content: text }]);
            input.value = ""; input.focus();
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

        async function startSync() {
            const { data } = await _client.from('messages').select('*').order('created_at', { ascending: true });
            document.getElementById('chat-window').innerHTML = "";
            if (data) { for (const m of data) { await draw(m); } }
            _client.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async p => await draw(p.new)).subscribe();
        }
    </script>
</body>
</html>
