<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovebirds Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --sarti: rgb(52, 137, 255); 
            --selena: rgb(252, 200, 77); 
            --line-color: rgb(200, 191, 231); 
            --gold-header: #9C6F41;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; background-color: #000;
            color: white; font-family: sans-serif; overflow: hidden; 
        }

        #app { display: none; height: 100vh; width: 100%; display: flex; justify-content: center; }
        #workspace { width: 100%; max-width: 1220px; position: relative; display: flex; flex-direction: column; align-items: center; }

        /* THE GOLD HEADER BAR */
        #top-header-bar {
            width: 100%; height: 50px; background: var(--gold-header);
            margin-top: 20px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; font-size: 14px; font-weight: bold;
        }
        .header-section { display: flex; align-items: center; gap: 15px; }

        /* CHAT AREA WITH VERTICAL LINES */
        #chat-container { width: 100%; flex: 1; position: relative; border-left: 1px solid var(--line-color); border-right: 1px solid var(--line-color); }
        
        /* ... (Existing Chat/Input CSS) ... */

        #input-area-wrap { width: 100%; border-left: 1px solid var(--line-color); border-right: 1px solid var(--line-color); padding: 10px 0; }
        #input-box { width: 100%; border-top: 1px solid var(--line-color); border-bottom: 1px solid var(--line-color); height: 50px; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="app">
        <div id="workspace">
            <div id="top-header-bar">
                <div class="header-section" id="user-status">LOGGED IN AS: ---</div>
                <div class="header-section">
                    <span>ALERT SETTINGS:</span>
                    <label><input type="checkbox" checked> POP UP ALERT</label>
                    <label><input type="checkbox" checked> SOUND ALERT</label>
                </div>
            </div>
            
            <div id="chat-container">
                </div>

            <div id="input-area-wrap">
                <div id="input-box">
                    <input type="text" id="msg-input" placeholder="Type Message...">
                    <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
